# Numeric sensor — seconds since last Verisure coordinator refresh (example)
template:
  - sensor:
      - name: Verisure seconds since update
        unique_id: verisure_seconds_since_update
        unit_of_measurement: s
        state: >
          {% set s = states.sensor.my_verisure_last_updated %}
          {% if s in ['unknown','unavailable'] %}
            none
          {% else %}
            {{ (now() - s | as_datetime).total_seconds() | int }}
          {% endif %}
