# When HA mode changes (input_select), mirror to Verisure — sketch only
alias: Verisure mode helper sync
mode: single
trigger:
  - platform: state
    entity_id: input_select.home_security_mode
action:
  - choose:
      - conditions:
          - condition: state
            entity_id: input_select.home_security_mode
            state: away
        sequence:
          - service: my_verisure.arm_away
            data:
              installation_id: INSTALLATION_ID
      - conditions:
          - condition: state
            entity_id: input_select.home_security_mode
            state: night
        sequence:
          - service: my_verisure.arm_night
            data:
              installation_id: INSTALLATION_ID
    default:
      - service: my_verisure.disarm
        data:
          installation_id: INSTALLATION_ID
