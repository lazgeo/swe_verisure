# Arm away when everyone leaves (person groups — adjust to your setup)
alias: Verisure arm away when zone empty
mode: single
trigger:
  - platform: state
    entity_id: zone.home
    from:
      - "1"
      - "2"
    to: "0"
condition: []
action:
  - service: my_verisure.arm_away
    data:
      installation_id: INSTALLATION_ID
