# Throttle: only one get_status per 5 minutes (input_boolean as guard)
alias: Verisure throttled refresh
mode: single
trigger:
  - platform: time_pattern
    minutes: "/5"
condition:
  - condition: state
    entity_id: input_boolean.verisure_refresh_enabled
    state: "on"
action:
  - service: my_verisure.get_status
    data:
      installation_id: INSTALLATION_ID
# Prerequisite: create input_boolean.verisure_refresh_enabled in Helpers.
