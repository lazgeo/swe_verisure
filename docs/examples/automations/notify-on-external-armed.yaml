# Notify when perimeter (external) binary sensor turns on
alias: Verisure - notify perimeter
description: Fires when external alarm partition becomes active
mode: single
trigger:
  - platform: state
    entity_id: binary_sensor.my_verisure_alarm_external
    to: "on"
condition: []
action:
  - service: notify.persistent_notification
    data:
      title: Verisure perimeter
      message: External perimeter is active
