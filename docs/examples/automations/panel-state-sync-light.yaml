# Drive a light color from panel state (adjust light entity)
alias: Verisure panel state light
mode: restart
trigger:
  - platform: state
    entity_id: sensor.my_verisure_panel_state
action:
  - choose:
      - conditions:
          - condition: state
            entity_id: sensor.my_verisure_panel_state
            state: disarmed
        sequence:
          - service: light.turn_on
            target:
              entity_id: light.status_led
            data:
              rgb_color: [0, 255, 0]
    default:
      - service: light.turn_on
        target:
          entity_id: light.status_led
        data:
          rgb_color: [255, 0, 0]
