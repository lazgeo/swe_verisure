# Example scripts for testing My Verisure services
# You can add test scripts here

test_arm_away:
  alias: "Test: Arm Away"
  sequence:
    - service: my_verisure.arm_away
      data:
        installation_id: "YOUR_INSTALLATION_ID"

test_arm_home:
  alias: "Test: Arm Home"
  sequence:
    - service: my_verisure.arm_home
      data:
        installation_id: "YOUR_INSTALLATION_ID"

test_disarm:
  alias: "Test: Disarm"
  sequence:
    - service: my_verisure.disarm
      data:
        installation_id: "YOUR_INSTALLATION_ID"
